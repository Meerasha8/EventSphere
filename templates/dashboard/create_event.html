{% extends "../components/dashboard_base.html" %}

{% block title %}
Create Event
{% endblock %}

{% block content %}

<h1>Create Event</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <input
        type="text"
        name="title"
        placeholder="Event Title"
    >

    <br><br>

    <textarea
        name="description"
        placeholder="Event Description"
    ></textarea>

    <br><br>

    <textarea
        name="ai_knowledge"
        placeholder="AI Knowledge"
    ></textarea>

    <br><br>

    <label>Event Logo</label>

    <br>

    <input
        type="file"
        name="event_logo"
    >

    <br><br>

    <label>Banner Image</label>

    <br>

    <input
        type="file"
        name="banner_image"
    >

    <br><br>

    <label>Category</label>

    <br>

    <select name="category">

        <option value="technical">
            Technical
        </option>

        <option value="sports">
            Sports
        </option>

        <option value="cultural">
            Cultural
        </option>

        <option value="speech">
            Speech
        </option>

        <option value="workshop">
            Workshop
        </option>

    </select>

    <br><br>

    <label>Mode</label>

    <br>

    <select name="mode">

        <option value="online">
            Online
        </option>

        <option value="offline">
            Offline
        </option>

        <option value="hybrid">
            Hybrid
        </option>

    </select>

    <br><br>

    <input
        type="text"
        name="venue"
        placeholder="Venue"
    >

    <br><br>

    <input
        type="text"
        name="city"
        placeholder="City"
    >

    <br><br>

    <label>Start Date</label>

    <br>

    <input
        type="date"
        name="start_date"
    >

    <br><br>

    <label>End Date</label>

    <br>

    <input
        type="date"
        name="end_date"
    >

    <br><br>

    <label>Start Time</label>

    <br>

    <input
        type="time"
        name="start_time"
    >

    <br><br>

    <label>End Time</label>

    <br>

    <input
        type="time"
        name="end_time"
    >

    <br><br>

    <input
        type="text"
        name="chief_guest"
        placeholder="Chief Guest"
    >

    <br><br>

    <button type="submit">
        Create Event
    </button>

</form>

{% endblock %}
