{% extends "../components/dashboard_base.html" %}

{% block title %}
My Events
{% endblock %}

{% block content %}

<h1>My Events</h1>

{% for event in events %}

    <div>

        <h2>
            {{ event.title }}
        </h2>

        <p>
            {{ event.category }}
        </p>

        <p>
            {{ event.city }}
        </p>

        <a href="{% url 'event_page' event.id %}">
            View
        </a>

        <br>

        <a href="/">
            Edit
        </a>

    </div>

    <hr>

{% empty %}

    <p>No events created yet.</p>

{% endfor %}

{% endblock %}
